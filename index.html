":"管理制度","stem":"项目图纸管理包括（   ）。","options":["A.图纸审查","B.图纸深化","C.图档管理","D.技术交底"],"answer":"ABCD","explanation":"依据《项目工程负责人工作指引》第三章第四节的规定，本题正确选项为ABCD。"},{"id":10,"category":"主体结构","stem":"以下关于不同标号混凝土浇筑说法正确的是（   ）。","options":["A.墙混凝土设计强度比梁、板混凝土设计强度高两个等级及以上时，应在交界区域采取钢丝网板分隔措施。","B.宜先浇筑低强度等级混凝土，后浇筑高强度等级混凝土。","C.低强度等级的混凝土不得浇入高强度等级混凝土区域。","D.分隔位置处不应形成施工缝，保证一侧混凝土浇筑后的初凝前完成另一侧混凝土的覆盖。"],"answer":"ACD","explanation":"依据《住宅工程产品质量标准化手册》1.2 混凝土工程的规定，本题正确选项为ACD。"},{"id":11,"category":"主体结构","stem":"以下关于条板安装说法正确的是（   ）。","options":["A.内墙板底部垫设防腐木楔并顶紧，保证墙体牢固，墙底缝隙不大于30mm。","B.安装完24h内采用C20细石混凝土将底部缝隙填塞密实。","C. 当在条板隔墙上横向开槽，开槽长度不应大于条板宽度的1/2。","D.安装前条板顶部满铺20mm—30mm厚专用粘结剂，安装时挤出粘结剂并收缝。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》1.6 蒸压加气混凝土条板工程的规定，本题正确选项为ABCD。"},{"id":12,"category":"主体结构","stem":"以下关于砌体工程的过程管控要点说法正确的是（    ）。","options":["A.砖砌体的灰缝应横平竖直，厚薄均匀，水平灰缝厚度及竖向灰缝宽度宜为15mm。","B.蒸汽加压混凝土砌块当采用砌筑砂浆时，水平灰缝厚度和竖向灰缝宽度不应超过15mm。","C.斜砖塞口需在砖墙砌筑完毕7d后砌筑，塞口水平角度应在45°-60°之间。","D.预制过梁应浇筑密实，厚度不宜小于120mm，强度符合规范要求。"],"answer":"BD","explanation":"依据《住宅工程产品质量标准化手册》1.5 砌体工程的规定，本题正确选项为BD。"},{"id":13,"category":"主体结构","stem":"以下关于预制构件灌浆施工说法正确的是（   ）。","options":["A.灌浆开始后，必须连续进行，不能间断，并尽可能缩短灌浆时间。","B.冬季灌浆料操作要求室温高于5℃，且养护温度应保持在5℃以上。","C.夏季晴天时，当表面温度高于30℃时，预先采取降温措施，拌和水水温控制在20℃以下，现取现用。","D.灌浆料在加水30分钟内用完，散落的灌浆料拌合物不得二次使用。"],"answer":"ACD","explanation":"依据《住宅工程产品质量标准化手册》1.3 装配式结构构件安装工程的规定，本题正确选项为ACD。"},{"id":14,"category":"主体结构","stem":"关于预制构件安装说法正确的是（   ）。","options":["A.预制构件吊装应采用慢起、快升、缓放的操作方式。","B.预制构件吊装校正，可采用“起吊－就位－初步校正－精细调整”的作业方式。","C.先行吊装的预制外墙板，安装时与楼层应有可靠安全的临时支撑。","D.预制外墙板饰面材料碰损，应在安装前修补，调换、修补饰面材料应采用配套粘结剂。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》1.3 装配式结构构件安装工程的规定，本题正确选项为ABCD。"},{"id":15,"category":"主体结构","stem":"地下室卷材防水施工的过程管控要点说法正确的是（    ）。","options":["A.先铺贴阴阳角等部位的附加层，附加层宽度不小于200mm。","B.先铺大面，再铺贴集水坑、后浇带等处的防水卷材。","C.卷材防水层与抗浮锚杆、桩头防水搭接宽度不应小于150mm。","D.卷材铺贴完毕，及时进行保护层浇筑，保证成品质量。"],"answer":"CD","explanation":"依据《住宅工程产品质量标准化手册》1.4 地下室防水工程的规定，本题正确选项为CD。"},{"id":16,"category":"室内工程","stem":"根据集团标准化要求，室内工程中墙面水泥砂浆做法的过程管控要点，描述正确的是（   ）。","options":["A.灰应分层进行，每遍厚度宜为5—7mm。","B.当抹灰总厚度超出35mm时，应采取加强措施。","C.水泥砂浆拌好后，应在初凝前用完，凡结硬砂浆不得继续使用。","D.采用喷雾器定期进行洒水养护，保持湿润，冬季施工温度需在5℃以上。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》2.2 抹灰工程的规定，本题正确选项为ABCD。"},{"id":17,"category":"室内工程","stem":"根据集团标准化要求，室内工程中墙面粉刷石膏做法的过程管控要点，描述正确的是（   ）。","options":["A.当墙面高度小于3.5m时，宜做立筋，两筋间距不宜大于1m。","B.抹灰厚度小于5mm的可直接用面层粉刷石膏。","C.墙面根部150mm宜采用水泥砂浆抹灰，防止粉刷石膏面受潮。","D.压光应在终凝前进行，压光时间可掌握在手指压在表面不出现明显压痕时为宜。"],"answer":"BCD","explanation":"依据《住宅工程产品质量标准化手册》2.2 抹灰工程的规定，本题正确选项为BCD。"},{"id":18,"category":"室内工程","stem":"以下关于乳胶漆饰面工程说法正确的是（   ）。","options":["A.面漆应喷刷连续、均匀、光泽一致、无色差，喷涂开始至结束4小时内门窗须保持关闭。","B.施工前应确保墙面无空鼓开裂，无污染和浮尘。","C.喷涂完成后应对喷涂中的流坠、胶凝、起皮等瑕疵立即进行处理。","D.基层为水泥砂浆抹灰须涂刷界面剂，界面涂刷应均匀、全面。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》3.2 墙饰面工程的规定，本题正确选项为ABCD。"},{"id":19,"category":"室内工程","stem":"在厨房安装工程中，关于橱柜柜体安装工程说法正确的是（   ）。","options":["A.橱柜的造型、尺寸、安装位置、制作和固定方法应符合设计要求并应满足人体工程学。","B.柜体与台面板、柜体与底座间的配合应紧密、平整，结合处应牢固，不松动。","C.挡水与墙体结合紧密并打胶封闭，胶条均匀、顺直，颜色宜与挡水颜色一致。","D.体满贴静电保护膜，台面宜选用瓦楞纸进行保护。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》3.4 门安装工程的规定，本题正确选项为ABCD。"},{"id":20,"category":"室内工程","stem":"在室内装修工程中，关于楼地面饰面工程说法正确的是（   ）。","options":["A.砖地板铺贴完成24小时后须进行洒水养护，夏天至少3天，冬天至少5天。","B.石材铺贴完养护3天后做好成品保护，再进行下一道工序，成品保护须选用透气性好的材料。","C.木地板专用塑料防潮薄膜要沿踢脚线上翻50mm，接口处互叠用透明胶带粘贴，防止水汽进入。","D.木地板提前7天运到施工区域平衡含水率，施工前须用大功率吸尘器清理地面浮灰。"],"answer":"BCD","explanation":"依据《住宅工程产品质量标准化手册》3.1 楼地面饰面工程的规定，本题正确选项为BCD。"},{"id":21,"category":"室内工程","stem":"在门安装工程中，关于入户门安装质量验收标准说法正确的是（   ）。","options":["A.门表面洁净。无划痕、碰伤，漆面平滑，色泽均匀，饰面纹理顺直自然。","B.门与墙体间缝隙的填嵌饱满，无空鼓、开裂、漏光、漏风等质量缺陷。","C.门扇开启顺畅，无晃动和异响，门槛踩踏无晃动、异响，与地面接缝平顺无缝隙。","D.安装的留缝限值、允许偏差：门扇对口缝、门扇与门框立缝宽度为1.5—2.5mm。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》3.4 门安装工程的规定，本题正确选项为ABCD。"},{"id":22,"category":"室内工程","stem":"根据集团标准化要求， 板块面层吊顶工程的过程管控要点，描述正确的是（   ）。","options":["A.当吊杆长度大于1500mm时，应设置反支撑。","B.重型灯具、电扇及其他重型设备应安装在吊顶工程的龙骨上。","C.吊杆距主龙骨端部距离不得大于300mm，当大于300mm时，应增加吊杆。","D.墙面与顶面阴角处严禁漏缝，如采用收胶处理，胶体应平顺整洁，宽度一致，无明显色差。"],"answer":"ACD","explanation":"依据《住宅工程产品质量标准化手册》3.3 吊顶工程的规定，本题正确选项为ACD。"},{"id":23,"category":"室内工程","stem":"根据集团标准化要求，硬包饰面工程做法的过程管控要点，描述正确的是（   ）。","options":["A.硬包安装完成后应用塑料膜进行覆盖，保护在完工保洁前禁止拆除。","B.基层板与基层板之间应留10mm变形缝，基层板须弹线并用自攻螺丝进行固定。","C.整体防火等级、含水率和防腐措施和甲醛含量必须符合国家规范要求。","D.面料与压条、踢脚板等交接处应严密、顺直。"],"answer":"ACD","explanation":"依据《住宅工程产品质量标准化手册》3.2 墙饰面工程的规定，本题正确选项为ACD。"},{"id":24,"category":"地下室地坪工程","stem":"地下室地坪施工前应具备的条件包括：","options":["A. 地下室顶板及外墙防水已完成","B. 地下室无明显渗漏和积水","C. 基层混凝土强度达到设计等级","D. 基层表面无油污、松散物和浮灰","E. 地下室通风良好、环境温湿度适宜"],"answer":"ABCDE","explanation":"地下室地坪施工前五项必备条件：①顶板外墙防水完成（防渗漏）；②无渗漏积水（保证基层干燥）；③基层强度达标（C25以上）；④基层清洁（粘结力保证）；⑤通风、温湿度适宜（保证材料正常固化）。以上任一项不满足都可能导致地坪质量问题。"},{"id":25,"category":"地下室地坪工程","stem":"金刚砂耐磨地坪常见的质量通病及原因包括：","options":["A. 表面起灰起砂——养护不到位或水灰比过大","B. 表面脱皮——撒布时机不当（过早或过晚）","C. 裂缝——基层沉降或未合理设缝","D. 色差——材料批次不同或撒布不均匀","E. 空鼓——基层未充分湿润或未涂刷界面剂"],"answer":"ABCD","explanation":"金刚砂地坪质量通病：①起灰起砂（养护不足/水灰比大）；②脱皮（撒布时机错：过早材料沉入混凝土，过晚无法结合）；③裂缝（基层沉降、未设缝）；④色差（不同批次材料混用/撒布不均）。空鼓（E）一般是环氧地坪的常见问题，金刚砂地坪是与混凝土一体施工，不存在空鼓问题。"},{"id":26,"category":"地下室地坪工程","stem":"环氧地坪施工中涂层系统的构成及各层作用，以下说法正确的是：","options":["A. 底涂层——渗透密封基层，提高附着力","B. 中涂层——增加厚度，找平基层缺陷","C. 面涂层——提供耐磨、耐腐蚀和装饰功能","D. 腻子层——填补基层孔洞和裂缝","E. 罩面层——提高光泽度和耐划伤性能"],"answer":"ABCDE","explanation":"环氧地坪涂层系统：①底涂（渗透密封，承上启下）；②中涂（增加厚度、找平）；③面涂（耐磨/防腐/装饰）；④腻子（填补孔洞裂缝，可选）；⑤罩面（提高光泽度/耐划伤，可选）。各层按需设置，薄涂系统可能省去中涂层和腻子层。"},{"id":27,"category":"地下室地坪工程","stem":"水磨石地坪施工的质量控制要点包括：","options":["A. 水泥石子浆配合比准确，搅拌均匀","B. 分格条安装牢固、顺直","C. 开磨时机恰当（石子不松动）","D. 磨光遍数不少于3遍（粗磨、中磨、细磨）","E. 打蜡前地面应充分干燥"],"answer":"ABCDE","explanation":"水磨石地坪质量控制：①配比准确（石子分布均匀）；②分格条牢固顺直（装饰和防裂）；③开磨时机（试磨石子不松动）；④磨光三遍（粗磨60-80目→中磨100-120目→细磨180-240目）；⑤干燥后打蜡。"},{"id":28,"category":"地下室地坪工程","stem":"地下室地坪防潮处理的关键措施包括：","options":["A. 基层混凝土中设置防潮层（PE薄膜等）","B. 涂刷环氧底涂封闭毛细孔","C. 施工前检测基层含水率（≤8%方可施工）","D. 设置排水沟和集水井，降低地下水位","E. 施工期间使用除湿机控制环境湿度"],"answer":"ABCDE","explanation":"地下室防潮五大措施：①结构层下/上设防潮层（PE膜/SBS防水卷材）；②环氧底涂封闭（切断毛细水上升通道）；③含水率检测（≤8%）；④排水系统降低地下水压力；⑤除湿机控制施工环境。地下室地坪防潮是头号难题，必须多措并举。"},{"id":29,"category":"公共部位工程","stem":"以下关于楼梯踏步及扶手安装说法正确是（   ）。","options":["A.楼梯扶手高度不应小于0.90m，水平段栏杆长度大于0.50m时，其扶手高度不应小于1.05m。","B.楼梯栏杆垂直杆件间净空不应大于0.11m。","C.楼层梯段相邻踏步高度差不应大于10mm，每踏步两端宽度差不应大于10m。","D.踏步做防滑措施，符合设计和规范要求。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》6.1 楼梯间工程的规定，本题正确选项为ABCD。"},{"id":30,"category":"公共部位工程","stem":"以下关于特种门工程说法正确是（   ）。","options":["A.防火门安装完成后，其门扇应启闭灵活，无反弹、翘角、卡阻和关闭不严等现象。","B.人防门安装流程：安装准备→立框隐检→挂扇调试→除锈涂漆→设置标志→检测验收。","C.卷门机应设有手动拉链和自动速放装置，其安装位置应便于操作，并应有明显标志。","D.单元门的地弹簧上平面标高应与室内地坪一致，需根据完成面标高线安装固定。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》6.1 特种门工程的规定，本题正确选项为ABCD。"},{"id":31,"category":"公共部位工程","stem":"关于地下室地坪漆说法正确的是（   ）。","options":["A.混凝土基层需养护28天以上，含水率在6%以下，基层不平或空鼓需整改。","B.各道工序养护硬化时间应达8小时以上。","C.养护期一般至少3天，到达养护期后，方可投入使用。","D.平涂型、砂浆型无气泡，自流平允许1个小气泡/10平方米。"],"answer":"ABD","explanation":"依据《住宅工程产品质量标准化手册》6.3 车库地面工程的规定，本题正确选项为ABD。"},{"id":32,"category":"屋面工程","stem":"关于坡屋面工程说法正确的是（    )。","options":["A.脊背部位防水垫层的搭接宽度不得小于100mm。","B.檐口部位应增设防水附加层，檐口500mm范围内的卷材应满粘。","C.木质顺水条和挂瓦条应采用等级为1级或Ⅱ级的木材，含水率不应大于18%并应做防腐防蛀处理。","D.檐沟宽度根据屋面集水区面积确定，不得出现侧面涌水现象。"],"answer":"ACD","explanation":"依据《住宅工程产品质量标准化手册》5.5 坡屋面工程的规定，本题正确选项为ACD。"},{"id":33,"category":"屋面工程","stem":"根据集团标准化要求，关于细石混凝土面层做法说法错误的是（   ）。","options":["A.屋面与女儿墙交接处预留10mm缝隙。","B.屋面分格缝应在面层施工前预留设置，或面层完成后二次切割。","C.保护层应设置6m×6m分格，每格面积不大于36m2。","D.油膏嵌填应饱满、无间隙、无气泡，密封材料表面呈凹状，中部比周围低3—5mm。"],"answer":"AB","explanation":"依据《住宅工程产品质量标准化手册》5.3平屋面细石混凝土面层工程的规定，本题正确选项为AB。"},{"id":34,"category":"屋面工程","stem":"根据集团标准化要求，找坡层、找平层施工描述正确的是（   ）。","options":["A.结构找坡不应小于3%。","B.材料找坡宜为1%。","C.找平层分格缝纵横间距不宜大于6m。","D.分格缝的宽度宜为10mm。"],"answer":"AC","explanation":"依据《住宅工程产品质量标准化手册》5.1平屋面找坡层、找平层工程的规定，本题正确选项为AC。"},{"id":35,"category":"外墙工程","stem":"外墙工程的抗裂砂浆施工时，应注意以下（    ）。","options":["A.网格布应自上而下铺设，门窗洞口内侧周边及洞口四角均加铺一层网格布进行加强处理。","B.网格布搭接宽度：左右、上下均不宜小于100mm。","C.保温层上的抗裂砂浆厚度应控制在10mm，砂浆层应包裹耐碱玻纤网格布。","D.网格布应在门窗洞口，管道或其他设备需穿墙的洞口处、勒脚、阳台、雨篷等部位进行翻包。"],"answer":"ABD","explanation":"依据《住宅工程产品质量标准化手册》4.1 外墙工程的规定，本题正确选项为ABD。"},{"id":36,"category":"外墙工程","stem":"外墙石材饰面质量验收时，应注意（    ）","options":["A.格均匀，板缝通顺，接缝填嵌密实，宽窄一致，无错台错位。","B.金属挂件和石材间密封和定位应采用建筑密封胶。","C.后置埋件的现场拉拔强度必须符合设计及规范要求。","D.与石材接触的金属挂件材料应使用不锈钢或铝合金。"],"answer":"ACD","explanation":"依据《住宅工程产品质量标准化手册》4.5 外墙石材工程的规定，本题正确选项为ACD。"},{"id":37,"category":"外墙工程","stem":"根据集团标准化要求，玻化微珠保温施工描述正确的是（   ）。","options":["A.基层处理时应进行润湿，界面砂浆未干燥时随抹保温砂浆。","B.保温砂浆应分层作业直至施工完成。","C.抹第一遍底层保温砂浆时，保温砂浆厚度宜控制在10mm左右。","D.施工温度不宜低于5℃。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》4.1 外墙工程的规定，本题正确选项为ABCD。"},{"id":38,"category":"外墙工程","stem":"根据JGJ 144-2019，外墙外保温系统应满足哪些基本性能要求？","options":["A. 耐候性（经80次热雨循环和5次热冷循环后无空鼓、脱落）","B. 抗风荷载性能（系统抗风压值不小于设计值）","C. 抗冲击性（P型≥3J）","D. 吸水量（24h浸水≤500g/m²）","E. 水蒸气湿流密度（≥0.85g/(m²·h)）"],"answer":"ABCDE","explanation":"根据JGJ 144-2019第4章，外墙外保温系统的五项基本性能要求：①耐候性（80次高温-淋水+5次热冷循环）；②抗风荷载（安全系数≥1.5）；③抗冲击性（P型≥3J，Q型≥10J）；④吸水量≤500g/m²（24h）；⑤水蒸气湿流密度≥0.85g/(m²·h)。全部满足才能保证系统的安全性和耐久性。"},{"id":39,"category":"外墙工程","stem":"外墙外保温系统施工前应进行基层处理，以下哪些是正确的基层验收要求？","options":["A. 基层应坚实、平整、干燥、清洁","B. 基层表面平整度偏差≤4mm/2m","C. 基层含水率不应大于10%","D. 基层表面不得有油污、脱模剂等影响粘结的物质","E. 混凝土墙面应涂刷界面处理剂"],"answer":"ABDE","explanation":"根据JGJ 144-2019第5.1.1条和GB 50411-2019第4.2.3条：基层应坚实平整干燥清洁（A正确），平整度≤4mm/2m（B正确），不得有油污脱模剂（D正确），混凝土墙面应涂刷界面剂（E正确）。关于含水率，规范未规定10%的具体数值，而是以基层表面不潮湿为准（C不够准确）。"},{"id":40,"category":"外墙工程","stem":"外墙外保温系统施工中，门窗洞口处的处理措施应包括：","options":["A. 保温板在洞口四角处应采用整板切割成型","B. 拼缝距洞口四角不应小于200mm","C. 洞口四角应加铺300mm×200mm的45°斜向附加网格布","D. 洞口周边应设防水密封处理","E. 洞口上沿应设滴水线或鹰嘴"],"answer":"ABCDE","explanation":"根据JGJ 144-2019第5.2.3条及相关节点构造要求，门窗洞口处应：①保温板整板切割不得拼接；②拼缝距角部≥200mm；③加铺45°附加网格布（300×200mm）；④周边防水密封；⑤上沿设滴水线防止雨水倒灌。这五项措施是防止洞口处保温层开裂、渗水的关键。"},{"id":41,"category":"外墙工程","stem":"关于外墙外保温系统的防火要求，以下说法正确的是：","options":["A. 住宅建筑高度大于100m时，保温材料应为A级","B. 当采用B1级保温材料时，每层应设A级防火隔离带","C. 防火隔离带高度不应小于300mm","D. 防火隔离带应采用满粘方式施工","E. 防火隔离带应与保温层施工同步进行"],"answer":"ABCDE","explanation":"根据GB 50016-2014（2018年版）第6.7条：①住宅H>100m和H>50m的公建应采用A级保温材料；②B1级时每层设防火隔离带；③隔离带高度≥300mm；④隔离带应满粘；⑤与保温施工同步。以上均为强制性条文要求。"},{"id":42,"category":"外墙工程","stem":"外墙外保温系统竣工验收时应提供的质量证明文件包括：","options":["A. 保温材料和配套材料的合格证及检测报告","B. 现场拉拔试验报告","C. 隐蔽工程验收记录","D. 锚栓拉拔力检测报告","E. 外墙节能构造钻芯检验报告"],"answer":"ABCDE","explanation":"根据GB 50411-2019第4.2.7条及第17章，外墙保温竣工验收文件包括：材料合格证和检测报告、现场粘结强度拉拔报告、隐蔽验收记录、锚栓拉拔力报告、节能构造钻芯报告。以上文件缺一不可，是工程验收的依据。"},{"id":43,"category":"外墙工程","stem":"关于外墙工程的成品保护，以下措施正确的是：","options":["A. 门窗框、玻璃、落水管等应在涂料施工前做好保护","B. 涂料施工完成后24h内避免雨水冲刷","C. 交叉作业中先施工完成的部分应采取覆盖保护","D. 拆脚手架时应防止碰撞和污染已完成的涂层","E. 已完成的涂料面层可作为其他工序的操作平台"],"answer":"ABCD","explanation":"根据JGJ/T 29-2015第6.4条：①涂料施工前做好门窗等保护；②施工后24h防雨；③交叉作业时覆盖保护；④拆架时防止碰撞污染。严禁将已完成的涂料面层作为操作平台或有任何形式的踩踏和碰撞（E错误）。"},{"id":44,"category":"外墙工程","stem":"根据JGJ 133，铝板幕墙工程铝板的选用应满足哪些基本要求？","options":["A. 铝单板厚度≥2.5mm","B. 铝板表面应采用氟碳喷涂处理","C. 氟碳树脂含量≥70%","D. 涂层附着力应达到0级","E. 铝板材质应为3系或1系铝合金"],"answer":"ABCDE","explanation":"根据JGJ 133：铝单板≥2.5mm（安全刚度），氟碳喷涂（耐候性），氟碳树脂含量≥70%（耐久性），附着力0级（划格法），宜采用Al-Mn系（3系如3003）或纯铝（1系如1100）铝合金。以上为铝板幕墙用材的基本要求。"},{"id":45,"category":"外墙工程","stem":"铝板幕墙安装的质量控制要点包括：","options":["A. 相邻面板接缝高低差≤1.0mm","B. 面板间伸缩缝≥10mm","C. 幕墙整体垂直度H≤30m时≤10mm","D. 不同金属连接处必须设置绝缘垫片","E. 密封胶注胶前应对接缝进行清洁处理"],"answer":"ABCDE","explanation":"铝板幕墙质量控制五项要点：①高低差≤1.0mm（观感质量）；②伸缩缝≥10mm（温度变形）；③垂直度≤10mm（H≤30m）；④绝缘垫片隔离（防腐）；⑤接缝清洁后注胶（保证密封胶粘结力）。以上每项均为保证幕墙安全和使用功能的关键控制点。"},{"id":46,"category":"外墙工程","stem":"铝板幕墙工程出现铝板表面涂层脱落的原因可能有哪些？","options":["A. 铝板涂装前表面处理不符合要求","B. 氟碳树脂含量不达标","C. 涂层厚度不足","D. 铝板基材存在污染或油渍","E. 涂层固化工艺参数不当"],"answer":"ABCDE","explanation":"涂层脱落五大原因：①表面前处理不良（脱脂、铬化不到位）；②氟碳树脂含量不足（<70%）；③涂层厚度不足（<30μm）；④基材表面污染（影响附着力）；⑤固化温度/时间不当。铝板涂层质量从原材料到工艺过程缺一不可。"},{"id":47,"category":"外墙工程","stem":"铝板幕墙中密封胶施工的注意事项包括：","options":["A. 密封胶必须在有效期内使用","B. 接缝处必须干燥、清洁、无油污","C. 注胶深度应为接缝宽度的1/2，且≥3.5mm","D. 密封胶不得三面粘结","E. 注胶后应进行修整，保证胶缝平整密实"],"answer":"ABCDE","explanation":"密封胶施工要点：①保质期内使用（过期密封胶粘结力下降）；②接缝干燥清洁（保证粘结）；③注胶深度≥3.5mm且为缝宽的1/2（保证变形能力）；④不得三面粘结（用背衬棒隔离底部）；⑤修整抹平（外观和防水双重要求）。"},{"id":48,"category":"外墙工程","stem":"铝板幕墙工程竣工验收应提供的资料包括：","options":["A. 铝板出厂合格证及涂层检测报告","B. 三性试验报告","C. 后置锚栓拉拔试验报告","D. 隐蔽工程验收记录","E. 淋水试验记录"],"answer":"ABCDE","explanation":"根据JGJ/T 139-2020，铝板幕墙竣工验收资料：铝板合格证+涂层报告、三性试验报告（风压/气密/水密）、锚栓拉拔报告、隐蔽验收记录、淋水试验记录。以上资料齐全方可进行竣工验收。"},{"id":49,"category":"幕墙工程","stem":"根据JGJ 102-2003，幕墙工程「三性试验」包括哪几项？","options":["A. 抗风压性能试验","B. 气密性能试验","C. 水密性能试验","D. 平面内变形性能试验","E. 热工性能试验"],"answer":"ABC","explanation":"根据JGJ 102-2003第4.2.3条，幕墙三性试验为：抗风压性能、气密性能和水密性能试验。平面内变形性能属于抗震设计范畴，热工性能属于建筑节能范畴，均不属于三性试验。三性试验应在幕墙批量施工前完成，试验合格后方可大面积安装。"},{"id":50,"category":"幕墙工程","stem":"幕墙工程中，以下哪些属于硅酮结构密封胶施工的关键控制点？","options":["A. 注胶前必须进行相容性和剥离粘结性试验","B. 注胶环境应洁净，温度15-30℃，相对湿度35%-75%","C. 注胶宽度和厚度应符合设计计算要求","D. 注胶后应进行养护，固化期间不得受力扰动","E. 结构胶应在有效期内使用"],"answer":"ABCDE","explanation":"硅酮结构胶施工关键点：①注胶前相容性+剥离试验（强制性）；②环境洁净，温湿度可控（防止污染）；③注胶尺寸严格按设计要求；④养护期间禁止扰动（通常需养护14-21天）；⑤检查有效期限。以上任何环节失控都可能导致结构胶失效，酿成重大安全事故。"},{"id":51,"category":"幕墙工程","stem":"关于幕墙防火设计，以下要求正确的是：","options":["A. 幕墙与每层楼板、隔墙处的缝隙应采用防火材料封堵","B. 防火层承托板应采用厚度≥1.5mm的镀锌钢板","C. 防火层耐火极限应满足主体结构的防火要求","D. 防火材料不得与幕墙玻璃直接接触","E. 同一幕墙单元不宜跨越两个防火分区"],"answer":"ABCDE","explanation":"根据JGJ 102-2003第4.4.11条及GB 50016：①楼板处缝隙必须防火封堵；②承托板≥1.5mm镀锌钢板（不得使用铝板）；③耐火极限匹配主体结构；④防火材料与玻璃间应有隔热处理，防止玻璃炸裂；⑤幕墙单元不宜跨防火分区，防止火灾蔓延。"},{"id":52,"category":"幕墙工程","stem":"幕墙工程的隐蔽工程验收应包括哪些内容？","options":["A. 预埋件（或后置锚栓）的安装质量","B. 构件与主体结构的连接节点","C. 幕墙四周、幕墙与主体结构间封堵构造","D. 变形缝及墙面转角处的构造节点","E. 防雷装置的连接"],"answer":"ABCDE","explanation":"根据JGJ/T 139-2020，幕墙隐蔽工程验收五大项：①预埋件/后置锚栓（位置、规格、数量、拉拔试验）；②连接节点（焊接质量、螺栓紧固）；③封堵构造（防火、防烟、防水）；④变形缝/转角节点；⑤防雷连接（均压环、接地电阻）。以上内容必须在封闭前完成验收。"},{"id":53,"category":"幕墙工程","stem":"幕墙玻璃的选用应满足哪些安全要求？","options":["A. 采用安全玻璃（钢化玻璃、夹层玻璃或其组合）","B. 人员密集场所的临空位置应采用夹层玻璃","C. 距地面1.5m以下部位应采用安全玻璃","D. 玻璃应能承受自重、风荷载、地震作用和温度作用","E. 反射比应≤0.30"],"answer":"ABCDE","explanation":"根据JGJ 102-2003及《建筑安全玻璃管理规定》：①幕墙必须使用安全玻璃；②人员密集场所临空面必须用夹层玻璃；③1.5m以下用安全玻璃（防人体撞击）；④考虑四项荷载组合；⑤反射比≤0.30（防光污染）。以上均为强制性安全要求。"},{"id":54,"category":"电梯工程","stem":"根据GB 50310-2002，电梯安装前的井道检查验收应包括哪些内容？","options":["A. 井道尺寸、垂直度是否满足电梯安装要求","B. 井道内预埋件、预留孔洞位置和尺寸是否正确","C. 井道底坑是否干燥、无渗水","D. 井道是否有足够的照明","E. 机房地面是否平整、有无预留孔洞"],"answer":"ABCDE","explanation":"根据GB 50310-2002第4.2条，电梯安装前应检查：①井道尺寸和垂直度（保证导轨和轿厢安装空间）；②预埋件和预留孔洞（导轨支架、层门地坎等安装基础）；③底坑干燥无渗水（防止电气设备受潮）；④井道照明；⑤机房条件（地面、孔洞、通风、电源）。全部合格方可进场安装。"},{"id":55,"category":"电梯工程","stem":"电梯的验收试验项目包括哪些？","options":["A. 空载、50%额定载荷和满载运行试验","B. 超载运行试验（110%额定载重量）","C. 安全钳联动试验","D. 缓冲器试验","E. 消防功能试验"],"answer":"ABCDE","explanation":"根据GB 50310-2002第6章，电梯验收试验包括：①三种载荷运行试验（空载/50%/满载各1.5h）；②超载试验（110%载荷，曳引能力验证）；③安全钳联动试验（限速器+安全钳）；④缓冲器试验；⑤消防迫降功能试验。所有试验记录应齐全、合格。"},{"id":56,"category":"电梯工程","stem":"电梯导轨安装的质量要求包括：","options":["A. 导轨安装垂直度每5m≤0.7mm","B. 轿厢导轨顶面间距偏差0~+2.0mm","C. 导轨接头处台阶偏差≤0.05mm","D. 导轨支架间距≤2.5m","E. 每根导轨至少应有2个支架"],"answer":"ABCDE","explanation":"根据GB 50310-2002第4.4条：①垂直度≤0.7mm/5m（平稳性）；②轿厢导轨间距0~+2.0mm（导向精度）；③接缝台阶≤0.05mm（避免振动）；④支架间距≤2.5m；⑤每导轨≥2支架（固定可靠）。以上全满足才能保证电梯运行平稳舒适。"},{"id":57,"category":"电梯工程","stem":"电梯层门安装的验收要求包括：","options":["A. 层门地坎至轿厢地坎水平距离偏差0~+3mm","B. 乘客电梯门扇间隙≤6mm","C. 层门锁紧元件啮合深度≥7mm","D. 层门自闭功能正常","E. 层门地坎应高出最终装修地面2-5mm"],"answer":"ABCDE","explanation":"根据GB 50310-2002第4.5条：①间距偏差0~+3mm（安全间隙）；②门扇间隙≤6mm（防夹）；③门锁啮合≥7mm（防开门走梯）；④自闭功能正常（安全）；⑤地坎高出装修地面2-5mm（防止水流进入井道）。层门安全是电梯安全的核心。"},{"id":58,"category":"电梯工程","stem":"电梯机房安装应满足哪些条件？","options":["A. 机房地面平整，能承受曳引机等设备重量","B. 机房通风良好，温度保持在5-40℃","C. 预留钢丝绳孔洞和承重梁的安装位置","D. 设置专用配电箱，独立电源","E. 机房内不得设置与电梯无关的设备或管道"],"answer":"ABCDE","explanation":"根据GB 50310-2002第4.2条：①机房地面承载力满足设备荷载；②通风控温5-40℃；③预留孔洞和承重梁；④独立专用电源；⑤不得有无关设备/管道（特别是水管，防止漏水损坏电梯设备）。机房是电梯的心脏，环境条件必须严格保证。"},{"id":59,"category":"给排水及采暖工程","stem":"关于住宅类项目综合管网布置优先级说法正确的是（   ）。","options":["A.无压管优于强弱电桥架","B.给水主管优于风管","C.强弱电桥架优于给水主管","D.给水主管优于分支管"],"answer":"ACD","explanation":"依据《住宅工程产品质量标准化手册》7.2 室内给排水工程的规定，本题正确选项为ACD。"},{"id":60,"category":"给排水及采暖工程","stem":"关于地板采暖管安装说法正确的是（    )。","options":["A.盘管隐蔽前必须进行水压试验，试压压力为工作压力的1.5倍，但不小于0.6MPa。","B.保护层施工过程中，地板敷设管道应处于保压状态。","C.加热盘管弯曲部分不得出现硬折弯现象，塑料管曲率半径不应小于管道外径的8倍，复合管曲率半径不应小于管道外径的5倍。","D.隔热层缝隙应用专用胶带粘接，形成整体性。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》7.3 采暖工程的规定，本题正确选项为ABCD。"},{"id":61,"category":"给排水及采暖工程","stem":"关于散热器管安装说法正确的是（    )。","options":["A.散热器支管的坡度应为1%坡向应利于排气和泄水。","B.散热器应按照设计和现场实际进行定位，不能影响房间家具布置及使用功能。","C.放风阀出水孔设置应背对墙面斜下方45°。","D.散热器背面与装饰后的墙内表面安装距离应符合设计或产品说明书要求，如设计未注明，应为10mm。"],"answer":"ABC","explanation":"依据《住宅工程产品质量标准化手册》7.3 采暖工程的规定，本题正确选项为ABC。"},{"id":62,"category":"燃气工程","stem":"根据CJJ 94-2009，室内燃气管道严禁敷设在哪些场所？","options":["A. 卧室和浴室","B. 易燃易爆品仓库","C. 配电间和变电室","D. 有腐蚀性介质的房间","E. 空调机房和通风机房"],"answer":"ABCDE","explanation":"根据CJJ 94-2009第4.3.6条，燃气管道严禁敷设在：卧室/浴室（人员密集/通风差）、易燃易爆品仓库（火源风险）、配电间/变电室（电火花）、腐蚀性介质房间（管道腐蚀）、空调/通风机房（气流扰动影响泄漏检测）。这五类场所均为强制性禁止敷设。"},{"id":63,"category":"燃气工程","stem":"燃气管道安装完成后应进行哪些试验？","options":["A. 强度试验（1.5倍设计压力，≥0.3MPa）","B. 严密性（气密性）试验（稳压6h，压降≤133Pa）","C. 管道吹扫（惰性气体置换）","D. 水压试验","E. 绝缘测试"],"answer":"ABC","explanation":"根据CJJ 94-2009第8章，燃气管道需做：①强度试验（验证管道承压能力）；②严密性试验（验证无泄漏）；③吹扫置换（排除空气）。水压试验和绝缘测试不是燃气管道必须做的试验（水压试验仅用于钢管等特殊情况，室内燃气管道通常用气压试验）。"},{"id":64,"category":"燃气工程","stem":"燃气管道穿越建筑基础、墙体或楼板时，以下做法正确的是：","options":["A. 必须设置钢制保护套管","B. 套管管径应比燃气管大1-2号","C. 套管与燃气管之间应采用柔性防腐防水材料密封","D. 套管两端应与墙、板面平齐","E. 套管内严禁设置管道接头"],"answer":"ABCDE","explanation":"根据CJJ 94-2009第4.3.7条：①设钢套管；②套管大1-2号（方便穿管和密封）；③柔性防腐防水密封（防水和气密）；④套管与墙面平齐（美观）；⑤套管内严禁接头（接头是潜在泄漏点，必须设在可检查的位置）。"},{"id":65,"category":"燃气工程","stem":"室内燃气工程竣工验收应检查的资料包括：","options":["A. 材料设备合格证和质量证明文件","B. 管道强度试验和气密性试验记录","C. 隐蔽工程验收记录","D. 焊工资格证书复印件","E. 设计变更文件及竣工图"],"answer":"ABCDE","explanation":"根据CJJ 94-2009第9章，燃气工程竣工验收资料涵盖：材料/设备合格证、强度+气密试验记录、隐蔽验收记录、焊工资质证明、设计变更+竣工图。资料不全不得验收通气。"},{"id":66,"category":"燃气工程","stem":"关于燃气安全使用，以下说法正确的是：","options":["A. 燃气管道和燃气表严禁安装在密闭橱柜内","B. 燃气灶下方橱柜应设通风孔","C. 天然气报警器应安装在距顶棚30cm以内","D. 燃气软管长度不得超过2m，不得穿墙","E. 燃气使用场所应具备良好的自然通风或机械通风条件"],"answer":"ABCDE","explanation":"以上五项均为燃气安全使用的强制性要求：①管道/表禁在密闭柜内（泄漏积聚风险）；②灶下柜通风孔（防止熄火后燃气积聚）；③报警器高位（天然气比空气轻）；④软管≤2m不穿墙（减少泄漏风险）；⑤通风良好（防止不完全燃烧产生CO中毒）。"},{"id":67,"category":"通风与空调工程","stem":"以下关于家用中央空调安装说法正确的是（   ）。","options":["A.室内机安装应根据吊顶定位，距离楼板不应小于10mm，避免震动。","B.吊装时应采用四根不小于φ10mm圆钢，超过1.5m长度需要增加斜撑避免晃动。","C.管与回风箱、风管连接应采用软连接，软接头安装应接口严密，不得利用软接头做翻弯或弯头使用。","D.风管和管道的绝热，应采用难燃材料。"],"answer":"AC","explanation":"依据《住宅工程产品质量标准化手册》8.2 通风系统工程的规定，本题正确选项为AC。"},{"id":68,"category":"通风与空调工程","stem":"以下关于屋面风机安装说法正确的是（   ）。","options":["A.风机外壳距离墙面和其他设备距离不应小于600mm，设备及金属件应做防雷接地。","B.防护罩网眼边长不宜大于50mm。","C.风机与风管连接时，应采用柔性短管连接，柔性短管应和风机同心，长度一般为150—300mm。","D.允许偏差：风机安装中心线的平面位移10mm，标高±10mm。"],"answer":"ACD","explanation":"依据《住宅工程产品质量标准化手册》8.1送排风系统工程的规定，本题正确选项为ACD。"},{"id":69,"category":"电气工程","stem":"以下关于供电干线安装工程说法正确的是（   ）。","options":["A.桥架在穿越楼板时，楼板面须在母线槽洞口外围设置50mm高的挡水坎，再做防火封堵。","B.室外电缆桥架底部要有泄水孔、有坡度坡向室外，入户处有防雨水进入的措施，防雷接地点不少于2处。","C.室内潮湿场所安装的配电柜底部应有不低于150—200mm的设备基础。","D.出配电间/电气竖井的孔洞均要做防火封堵，穿越楼板的孔洞需做止水台。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》9.2供电干线安装工程的规定，本题正确选项为ABCD。"},{"id":70,"category":"电气工程","stem":"以下关于变配电室高、低压配电设备安装说法正确的是（   ）。","options":["A.安装前要做变配电室设备布局策划，画出布局图。","B.控制配电柜水平及垂直度、基础槽钢平直及水平度。","C.柜上装有电器的开启的柜门，应以裸铜软线与接地的金属构架可靠地连接。","D.变配电所不应有与其无关的管道和线路通过，配电室地面平整，铺橡胶绝缘板。"],"answer":"ABCD","explanation":"依据《住宅工程产品质量标准化手册》9.6 变配电室工程的规定，本题正确选项为ABCD。"},{"id":71,"category":"电气工程","stem":"以下关于配电箱安装说法正确的是（   ）。","options":["A.配电箱距采暖管道不小于100mm。","B.配电箱箱体方正，无歪斜，标高正确，底边距地宜为1.8m。","C.安装箱体后要做成品保护，结构预埋时需对箱体做内支撑保护。","D.线管管道影响结构强度，必须用细石混凝土浇筑。"],"answer":"BCD","explanation":"依据《住宅工程产品质量标准化手册》9.1 电气管盒、照明器具安装工程的规定，本题正确选项为BCD。"},{"id":72,"category":"室外工程","stem":"以下关于灌木球质量标准说法正确的是（   ）。","options":["A.吊装运输过程中不得私自修剪，灌木修剪应在施工现场由专业修枝人员操作修剪；","B.所有点缀灌木均须带土球。同时土球应包扎完整，无松散、假土球现象；","C.灌木脚部整齐清洁，无过长杂草杂物，无严重黄叶、积尘；","D.主干、分枝无折断、缺失，整株树皮无损伤；"],"answer":"ABCD","explanation":"依据《室外工程标准化手册》第三章第二节的规定，本题正确选项为ABCD。"},{"id":73,"category":"室外工程","stem":"以下关于灯具布置原则说法正确的是（   ）。","options":["A.庭院灯距离住宅最近尺寸不低于3m","B.草坪灯最近间距建议8-10m，","C.庭院灯最近间距庭院灯建议18-25m","D.庭院灯及草坪灯安装位置距离道路边缘不小于 0.5m；"],"answer":"BCD","explanation":"依据《室外工程标准化手册》第三章第三节的规定，本题正确选项为BCD。"},{"id":74,"category":"室外工程","stem":"以下关于给排水功能设施说法正确的是（   ）。","options":["A.取水口结合雨水口统一设置，并采用装饰面板美化，取水口位置距离路边﹤30cm；","B.每个项目单独设计带项目 LOGO 字体的雨水口盖板，盖板镂空形式应满足排水量要求，避免积水","C.铺装内井盖宜采用双层井盖，面层井盖应采用分体式不锈钢井盖，","D.绿地内井盖宜采用高分子种植井盖，强度等级不低于A15；"],"answer":"ABCD","explanation":"依据《室外工程标准化手册》第三章第三节的规定，本题正确选项为ABCD。"},{"id":75,"category":"室外工程","stem":"以下关于铺装与绿地收口说法正确的是(   )。","options":["A.路缘石完成面高于种植土完成面3-5cm；","B.砾石高于路面至少20mm；","C.绿化与硬景之间草沟4*4cm，保证宽度一致、弧线顺滑。","D.不锈钢板收边宜选用本色，厚度为5mm厚U型折弯钢板或直角折板"],"answer":"ACD","explanation":"依据《室外工程标准化手册》第三章第一节的规定，本题正确选项为ACD。"},{"id":76,"category":"室外工程","stem":"施工图设计阶段景观工程师工作要点包括以下内容（   ）。","options":["A.参与景观界面划分","B.综合管网初步叠图","C.完成图纸审核及意见反馈","D.景观专项梳理"],"answer":"ABCD","explanation":"依据《室外工程标准化手册》第二章第一节的规定，本题正确选项为ABCD。"},{"id":77,"category":"室外工程","stem":"木平台必须采用架空做法，以下关于木平台说法正确的是（  ）。","options":["A.架空高度不低于150mm","B.龙骨截面不应小于50*100mm","C.龙骨间距不大于600mm","D.金属连接件必须采用防锈处理的角铁或不锈钢，不锈钢螺丝钉；"],"answer":"ABCD","explanation":"依据《室外工程标准化手册》第三章第一节的规定，本题正确选项为ABCD。"},{"id":78,"category":"室外工程","stem":"沥青混合料的压实应按（    ）进行碾压。","options":["A.初压","B.复压","C.终压","D.回压"],"answer":"ABC","explanation":"依据《室外工程标准化手册》第三章第一节的规定，本题正确选项为ABC。"}],"判断题":[{"id":1,"category":"管理制度","stem":"区域公司负责落实“百分百创优”战略，确保创优目标达成。（  ）","options":["A.对","B.错"],"answer":"B","explanation":"依据《工程质量管理办法》第三章过程管理，第九条管理要点的规定，本题判断为「错误」。"},{"id":2,"category":"管理制度","stem":"各级单位必须严格执行样板管理，样板验收通过后方可大面积施工。（  ）","options":["A.对","B.错"],"answer":"A","explanation":"依据《工程质量管理办法》第三章过程管理，第八条管理要点的规定，本题判断为「正确」。"},{"id":3,"category":"管理制度","stem":"工程质量风险包含工程质量问题和工程质量事故两类。（  ）","options":["A.对","B.错"],"answer":"B","explanation":"依据《工程质量风险及缺陷责任追究管理规定》第三章工程质量风险分类和认定的规定，本题判断为「错误」。"},{"id":4,"category":"管理制度","stem":"工程检查评价只对项目进行综合评价评分，不涉及对区域公司的评价。（  ）","options":["A.对","B.错"],"answer":"B","explanation":"依据《工程检查评价管理办法》第三章工程检查评价管理的规定，本题判断为「错误」。"},{"id":5,"category":"管理制度","stem":"工程检查评估评分标准实测实量维度中，室内工程和园林实测各占比50%。","options":["A.对","B.错"],"answer":"B","explanation":"依据工程检查实施细则（2024）的规定，本题判断为「错误」。"},{"id":6,"category":"管理制度","stem":"项目组按本办法要求，原则上每月开展多项工程专项检查，并将检查及整改结果报上级单位备案。（  ）","options":["A.对","B.错"],"answer":"A","explanation":"依据《工程检查评价管理办法》第二章管理职责的规定，本题判断为「正确」。"},{"id":7,"category":"管理制度","stem":"项目组负责制定措施强化质量风险及缺陷预控，加强过程管理，组织对已发生质量风险及缺陷进行整改。（  ）","options":["A.对","B.错"],"answer":"A","explanation":"依据《工程质量风险及缺陷责任追究管理规定》第二章管理职责的规定，本题判断为「正确」。"},{"id":8,"category":"实测实量","stem":"在实测实量中，采用激光测距仪测量房间开间进深时，只需取一个测点即可判定合格。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据实测实量操作规程，同一房间应至少取3个以上测点（通常在距墙边300mm及中间位置），取最大值和最小值计算极差，极差不应大于15mm。仅取一个测点无法反映房间尺寸的一致性。"},{"id":9,"category":"实测实量","stem":"实测实量中，混凝土结构垂直度偏差超过10mm时，可通过抹灰厚度进行完全弥补。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据GB 50210-2018，普通抹灰层每层厚度宜为5-7mm，总厚度宜为18-20mm且不宜大于25mm，超过此范围抹灰层易开裂脱落。当垂直度偏差超过10mm时，应综合采用剔凿、加固抹灰等方案处理，不能仅靠抹灰弥补。"},{"id":10,"category":"主体结构","stem":"墙、柱浇筑前应先填50—100mm厚与混凝土配合比相同的减石子砂浆。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》1.2 混凝土工程的规定，本题判断为「正确」。"},{"id":11,"category":"主体结构","stem":"安装完24h内采用水泥砂浆将底部缝隙填塞密实。","options":["A.对","B.错"],"answer":"B","explanation":"依据《住宅工程产品质量标准化手册》1.5 蒸压加气混凝土条板工程的规定，本题判断为「错误」。"},{"id":12,"category":"主体结构","stem":"斜砖塞口需在砖墙砌筑完毕14d后砌筑，塞口水平角度应在45°-60°之间。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》1.5 砌体工程的规定，本题判断为「正确」。"},{"id":13,"category":"主体结构","stem":"砖砌体灰缝砂浆应密实饱满，砖墙水平灰缝的砂浆饱满度不得低于70%；柱水平灰缝和竖向灰缝饱满度不得低于80%。","options":["A.对","B.错"],"answer":"B","explanation":"依据《住宅工程产品质量标准化手册》1.5 砌体工程的规定，本题判断为「错误」。"},{"id":14,"category":"主体结构","stem":"预制构件应在明显部位标明生产单位、构件型号、生产日期和质量验收标志。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》1.3 装配式结构构件安装工程的规定，本题判断为「正确」。"},{"id":15,"category":"室内工程","stem":"厨卫间的穿板管道需与主体工程同步预埋施工，预埋位置必须准确。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》2.1 楼地面工程的规定，本题判断为「正确」。"},{"id":16,"category":"室内工程","stem":"地漏安装时地漏内水封高度不得小于50mm。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》3.7 卫浴洁具安装工程的规定，本题判断为「正确」。"},{"id":17,"category":"室内工程","stem":"天然石材粘贴前，要进行防碱背涂处理，石材与墙体间灌注材料应饱满、密实。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》3.2 墙饰面工程的规定，本题判断为「正确」。"},{"id":18,"category":"室内工程","stem":"木地板提前1天运到施工区域平衡含水率，施工前须用大功率吸尘器清理地面浮灰。","options":["A.对","B.错"],"answer":"B","explanation":"依据《住宅工程产品质量标准化手册》3.1 楼地面饰面工程的规定，本题判断为「错误」。"},{"id":19,"category":"室内工程","stem":"浴室墙面的防水层高度不得低于1800mm，洗手盆位置应高于洗手盆完成面500mm以上。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》3.6 防水工程的规定，本题判断为「正确」。"},{"id":20,"category":"地下室地坪工程","stem":"环氧地坪施工时，如果基层含水率超标，可以通过增加底涂用量来弥补，一样可以保证涂层质量。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据JGJ/T 175-2018第4.1.4条，基层含水率超过8%时不得进行环氧地坪施工。增加底涂用量并不能有效阻止基层潮气上返，反而在潮气压力下会使环氧涂层起泡、脱层。含水率超标时应先进行防潮处理（如涂刷防潮底漆、加热除湿等），待含水率达标后方可施工。"},{"id":21,"category":"地下室地坪工程","stem":"地下室地坪施工完成后，所有类型的地坪（金刚砂、环氧、水磨石）都需要进行养护和成品保护，养护期间不得上人和堆放材料。","options":["A.对","B.错"],"answer":"A","explanation":"正确。根据GB 50209-2010和JGJ/T 175-2018，三种地坪养护要求：金刚砂地坪养护≥7d（洒水/覆盖薄膜），环氧地坪养护≥7d（常温固化，涂膜完全硬化），水磨石地坪养护≥3d（打磨完成后草酸清洗、上蜡前干燥）。养护期间严禁上人和堆载，否则会造成不可逆的质量缺陷。"},{"id":22,"category":"屋面工程","stem":"卷材收头应用金属压条钉压，并应用密封材料封严，金属压条固定钉间距不宜大于500mm或符合当地标准。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》5.2平屋面卷材防水工程的规定，本题判断为「正确」。"},{"id":23,"category":"屋面工程","stem":"屋面出入口泛水高度不得小于250mm，出入口位置应设置台阶，台阶尽量采用两级以上。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》5.3平屋面细石混凝土面层工程的规定，本题判断为「正确」。"},{"id":24,"category":"屋面工程","stem":"屋面栏杆防护高度：低、多层住宅不应低于1.05m，中、高层住宅不应低于1.1m。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》 5.3 平屋面细石混凝土面层工程的规定，本题判断为「正确」。"},{"id":25,"category":"外墙工程","stem":"外窗台应设置不小于2%外排水坡度。","options":["A.对","B.错"],"answer":"B","explanation":"依据《住宅工程产品质量标准化手册》4.4 外窗工程的规定，本题判断为「错误」。"},{"id":26,"category":"外墙工程","stem":"外立面玻璃栏板中，护栏玻璃应使用公称厚度不小于12mm的钢化玻璃或钢化夹层玻璃。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》4.9 外立面附属设施工程的规定，本题判断为「正确」。"},{"id":27,"category":"外墙工程","stem":"外墙外保温系统施工时，当环境气温高达38℃时仍可正常施工，无需采取特殊措施。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据JGJ 144-2019第7.2.1条，夏季高温（＞35℃）施工时，基层应提前洒水润湿，胶粘剂和抹面胶浆应遮阳施工，已完成的保温层应洒水养护不少于2d。高温施工时水分蒸发过快，会导致胶粘剂水化不充分、粘结强度大幅降低。"},{"id":28,"category":"外墙工程","stem":"外墙外保温系统中，当保温板采用点框法粘贴时，边框胶粘剂的宽度不应小于50mm。","options":["A.对","B.错"],"answer":"A","explanation":"正确。根据JGJ 144-2019第5.2.2条，点框法施工时，边框胶粘剂的涂抹宽度应≥50mm，厚度宜为10-15mm。边框的作用是形成封闭的空气层，同时防止雨水从板缝渗入。施工中应确保边框胶粘剂连续不间断。"},{"id":29,"category":"外墙工程","stem":"铝板幕墙施工完成后，铝板之间的伸缩缝用密封胶完全填充即可，不需要设置背衬材料（泡沫棒）。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据JGJ 133第6.3.7条，伸缩缝内必须设置背衬材料（泡沫棒），密封胶不得三面粘结。三面粘结会限制密封胶的自由伸缩变形能力，当铝板因温度变化产生位移时，密封胶极易被撕裂失效，导致渗水。"},{"id":30,"category":"外墙工程","stem":"铝板幕墙中，铝板加强筋与铝板之间可采用普通双面胶带粘结固定。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据JGJ 133第5.4.3条，加强筋与铝板的连接应采用结构胶粘结、焊接或机械连接，不得使用普通胶带。普通双面胶带的粘结力、耐老化性能和温度适应性均不满足幕墙长期使用的要求，是严重的安全隐患。"},{"id":31,"category":"幕墙工程","stem":"幕墙工程中，后置锚栓可以不进行现场拉拔试验，凭产品合格证即可验收。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据JGJ 102-2003第5.5.3条和JGJ 145《混凝土结构后锚固技术规程》，后置锚栓必须进行现场拉拔试验，试验数量为每种规格锚栓总数的1‰且不少于3根。拉拔力应满足设计要求。仅凭产品合格证无法证明锚栓在实际工况下的承载力。"},{"id":32,"category":"幕墙工程","stem":"隐框和半隐框玻璃幕墙中，玻璃与铝框之间完全依靠硅酮结构密封胶粘结传力，其他连接方式仅起辅助固定作用。","options":["A.对","B.错"],"answer":"A","explanation":"正确。根据JGJ 102-2003第5.6.1条，隐框和半隐框玻璃幕墙的玻璃与铝合金框架的粘结，必须采用硅酮结构密封胶。结构胶承担玻璃自重和风荷载的全部传递作用，是隐框幕墙的「生命线」。因此对结构胶的质量控制和施工工艺要求极为严格。"},{"id":33,"category":"电梯工程","stem":"电梯安装完成后，限速器-安全钳联动试验只需进行一次即可，不需要重复验证。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据GB 50310-2002第6.2.3条，安全钳联动试验应按不同载荷条件多次进行：轿厢空载时对重安全钳试验（检修速度上行），轿厢满载时轿厢安全钳试验（检修速度下行）。对重侧和轿厢侧均需独立验证，不能只做一次就认定合格。"},{"id":34,"category":"电梯工程","stem":"电梯层门地坎的安装标高可以根据现场情况灵活确定，不需要以最终装修完成面为基准。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据GB 50310-2002第4.5.2条，层门地坎的安装标高必须以各层最终装修完成面为基准确定，地坎应高出最终装修地面2-5mm。如果以结构面为基准而忽略装修厚度，会导致装修后地坎低于地面（积水隐患）或高出地面过多（绊倒风险）。"},{"id":35,"category":"给排水及采暖工程","stem":"穿过楼板和墙的套管与管道之间缝隙应用阻燃密实材料和防水油膏填实，端面光滑。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》7.1 预留预埋工程的规定，本题判断为「正确」。"},{"id":36,"category":"燃气工程","stem":"室内燃气管道强度试验和气密性试验可以使用燃气（天然气）作为试验介质，只要能检测到泄漏即可。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据CJJ 94-2009第8.2.1条，燃气管道压力试验必须采用压缩空气或惰性气体（如氮气），严禁使用可燃气体作为试验介质。使用燃气打压会形成可燃气体与空气的爆炸性混合物，存在严重的爆燃爆轰风险。"},{"id":37,"category":"燃气工程","stem":"燃气管道明敷时，可以沿卧室和浴室的墙面敷设，只要做好防腐处理即可。","options":["A.对","B.错"],"answer":"B","explanation":"错误。根据CJJ 94-2009第4.3.6条，燃气管道严禁敷设在卧室、浴室等场所，不是「做好防腐处理即可」的问题，而是根本不允许敷设。这两个场所属于人员长时间停留且通风条件不佳的空间，一旦燃气泄漏极易造成窒息或爆燃事故。"},{"id":38,"category":"通风与空调工程","stem":"盘管与回风箱、风管连接应采用软连接，软接头安装应接口严密，可用做翻弯或弯头使用。","options":["A.对","B.错"],"answer":"B","explanation":"依据《住宅工程产品质量标准化手册》8.2 空调风系统工程的规定，本题判断为「错误」。"},{"id":39,"category":"电气工程","stem":"进出配电间/电气竖井的孔洞均要做防火封堵，穿越楼板的孔洞需做止水台。","options":["A.对","B.错"],"answer":"A","explanation":"依据《住宅工程产品质量标准化手册》9.2 供电干线安装工程的规定，本题判断为「正确」。"},{"id":40,"category":"室外工程","stem":"地面铺装完成后应使用拖把将铺装地面拖擦干净，并采用三层防护进行成品保护，第一层铺设薄膜，第二层彩条布防护，第三层采用木工板保护。","options":["A.对","B.错"],"answer":"A","explanation":"依据《室外工程标准化手册》第三章第一节的规定，本题判断为「正确」。"},{"id":41,"category":"室外工程","stem":"工程样板打样未确认前，严禁大面铺排施工。","options":["A.对","B.错"],"answer":"A","explanation":"依据《室外工程标准化手册》第三章第四节的规定，本题判断为「正确」。"},{"id":42,"category":"室外工程","stem":"排水管网布置时遵照“有压管让无压管，小管让大管，先主管后支管”的原则；","options":["A.对","B.错"],"answer":"A","explanation":"依据《室外工程标准化手册》第三章第三节的规定，本题判断为「正确」。"},{"id":43,"category":"室外工程","stem":"水景构造施工时应使用铁丝搭接钢筋固定模板或者进行对穿固定模板。","options":["A.对","B.错"],"answer":"B","explanation":"依据《室外工程标准化手册》第三章第一节的规定，本题判断为「错误」。"},{"id":44,"category":"室外工程","stem":"水景湿贴部位应采用水泥砂浆或石材胶泥灌贴；","options":["A.对","B.错"],"answer":"B","explanation":"依据《室外工程标准化手册》第三章第一节的规定，本题判断为「错误」。"},{"id":45,"category":"室外工程","stem":"胸径12-25cm的乔木，统一采用井字架四角支撑，小乔木采用一字撑。","options":["A.对","B.错"],"answer":"A","explanation":"依据《室外工程标准化手册》第三章第二节的规定，本题判断为「正确」。"},{"id":46,"category":"室外工程","stem":"透水混凝土摊铺时间长于30min或遇大风天气及时覆盖塑料布。","options":["A.对","B.错"],"answer":"A","explanation":"依据《室外工程标准化手册》第三章第一节的规定，本题判断为「正确」。"},{"id":47,"category":"室外工程","stem":"透水混凝土施工流程中，同一色块透水混凝土应分段施工成型。","options":["A.对","B.错"],"answer":"B","explanation":"依据《室外工程标准化手册》第三章第一节的规定，本题判断为「错误」。"},{"id":48,"category":"室外工程","stem":"配电箱应设于山墙边或者隐蔽位置，按双层防水设计考虑箱体。","options":["A.对","B.错"],"answer":"A","explanation":"依据《室外工程标准化手册》第三章第三节的规定，本题判断为「正确」。"},{"id":49,"category":"室外工程","stem":"龟背栽植时，最外侧的绿篱栽植，与地面呈45°角，通过修剪保持龟背造型。","options":["A.对","B.错"],"answer":"A","explanation":"依据《室外工程标准化手册》第三章第二节的规定，本题判断为「正确」。"},{"id":50,"category":"其他","stem":"室外给水管道埋深车行道下不低于0.50米，其他不低于0.30米。","options":["A.对","B.错"],"answer":"B","explanation":"本题判断结果为「错误」。"}]};

let mode = 'self';

let userAnswers = {};

try { rankings = JSON.parse(localStorage.getItem('exam_rankings') || '[]'); } catch(e) {}

function selectMode(m) {
    mode = m;
    document.getElementById('seg-self').classList.toggle('active', m === 'self');
    document.getElementById('seg-exam').classList.toggle('active', m === 'exam');
    document.getElementById('mode-desc').textContent = m === 'self' ? '随机抽题 · 即时出分 · 查看解析 · 数据不上传' : '随机抽题 · 成绩排名 · 数据上传 · 计入档案';
}

function startExam() {
    var company = document.getElementById('company').value.trim();
    var project = document.getElementById('project').value.trim();
    var name = document.getElementById('name').value.trim();
    var position = document.getElementById('position').value.trim();
    if (!company || !project || !name || !position) { alert('请完整填写所有信息！'); return; }
    if (QB['单选题'].length < 20 || QB['多选题'].length < 10 || QB['判断题'].length < 10) { alert('题库数量不足！'); return; }

    window._user = { company: company, project: project, name: name, position: position };

    function shuffle(arr) { var a = arr.slice(); for (var i = a.length-1; i>0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

    var dxx = shuffle(QB['单选题']).slice(0, 20);
    var dxz = shuffle(QB['多选题']).slice(0, 10);
    var pdt = shuffle(QB['判断题']).slice(0, 10);

    examQuestions = [];
    dxx.forEach(function(q,i){ examQuestions.push({type:'单选题',idx:i,points:3,qid:'dxx_'+i,stem:q.stem,category:q.category,options:q.options.slice(),answer:q.answer,explanation:q.explanation}); });
    dxz.forEach(function(q,i){ examQuestions.push({type:'多选题',idx:i,points:3,qid:'dxz_'+i,stem:q.stem,category:q.category,options:q.options.slice(),answer:q.answer,explanation:q.explanation}); });
    pdt.forEach(function(q,i){ examQuestions.push({type:'判断题',idx:i,points:1,qid:'pdt_'+i,stem:q.stem,category:q.category,options:q.options.slice(),answer:q.answer,explanation:q.explanation}); });

    // Keep original option order, no shuffle
    examQuestions.forEach(function(q) {
        q.questionOptions = q.options.slice();
        q.correctAnswer = q.answer;
    });

    userAnswers = {}; examStartTime = Date.now();

    // Anti-cheat: warning on 1st switch, force submit on 2nd
    window._examActive = true;
    window._cheatCount = 0;
    window._cheatLock = false;
    window._cheatHandler = function() {
        if (!window._examActive || window._cheatLock) return;
        if (document.hidden) {
            window._cheatLock = true;
            window._cheatCount++;
            if (window._cheatCount >= 2) {
                window._examActive = false;
                clearInterval(timerInterval);
                submitExam();
            }
            setTimeout(function() { window._cheatLock = false; }, 1000);
        }
    };
    document.addEventListener('visibilitychange', window._cheatHandler);

    document.getElementById('page-register').classList.add('hidden');
    document.getElementById('page-exam').classList.remove('hidden');
    document.getElementById('page-results').classList.add('hidden');
    document.getElementById('exam-info').textContent = name + ' · ' + company;
    document.getElementById('btn-submit').disabled = false;
    renderQuestions(); renderQuestionNav(); startTimer(1500); window.scrollTo(0,0);
}

function startTimer(sec) {
    var r = sec; updateTimer(r);
    timerInterval = setInterval(function() {
        r--; updateTimer(r);
        if (r <= 0) { clearInterval(timerInterval); submitExam(); }
        if (r <= 300) document.getElementById('timer').classList.add('warn');
    }, 1000);
}
function updateTimer(s) {
    var m = Math.floor(s/60), sec = s%60;
    document.getElementById('timer').textContent = String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function renderQuestions() {
    var c = document.getElementById('questions-container'), h = '', labels = 'ABCDEFGHIJ';
    examQuestions.forEach(function(q, i) {
        h += '<div class="q-block" id="q_'+q.qid+'"><div class="q-header"><span class="q-badge num">第'+(i+1)+'题 · '+q.type+' · '+q.points+'分</span><span class="q-badge cat">'+q.category+'</span></div>';
        h += '<div class="q-stem">'+q.stem+'</div>';
        q.questionOptions.forEach(function(opt, oi) {
            var isCheck = q.type === '多选题';
            h += '<div class="opt-item" data-qid="'+q.qid+'" data-val="'+labels[oi]+'" data-ischeck="'+isCheck+'" onclick="toggleOptByEl(this)"><div class="'+(isCheck?'opt-check':'opt-radio')+'" id="dot_'+q.qid+'_'+oi+'"></div><div class="opt-text">'+opt+'</div></div>';
        });
        h += '</div>';
    });
    c.innerHTML = h;
}

function toggleOpt(qid, val, isCheck) {
    if (isCheck) {
        if (!userAnswers[qid]) userAnswers[qid] = {};
        if (userAnswers[qid][val]) { delete userAnswers[qid][val]; } else { userAnswers[qid][val] = true; }
    } else {
        userAnswers[qid] = val;
    }
    // Update dots
    var q = examQuestions.find(function(x){ return x.qid===qid; });
    var labels = 'ABCDEFGHIJ';
    q.questionOptions.forEach(function(_, oi) {
        var dot = document.getElementById('dot_'+qid+'_'+oi);
        if (!dot) return;
        var v = labels[oi];
        if (isCheck) {
            dot.classList.toggle('checked', !!(userAnswers[qid] && userAnswers[qid][v]));
        } else {
            dot.classList.toggle('checked', userAnswers[qid] === v);
        }
    });
    updateProgress(); renderQuestionNav();
}

function updateProgress() {
    var ans = 0;
    Object.keys(userAnswers).forEach(function(k) {
        var v = userAnswers[k];
        if (typeof v === 'object') { if (Object.keys(v).length>0) ans++; }
        else if (v) ans++;
    });
    document.getElementById('progress').style.width = Math.round(ans/examQuestions.length*100)+'%';
}

function scrollToQ(el) {
    var qid = el.getAttribute('data-qid');
    var target = document.getElementById('q_'+qid);
    if (target) { target.scrollIntoView({behavior:'smooth',block:'center'}); target.style.boxShadow='0 0 0 3px rgba(0,122,255,0.3)'; setTimeout(function(){target.style.boxShadow='';},1500); }
}
function toggleOptByEl(el) {
    var qid = el.getAttribute('data-qid');
    var val = el.getAttribute('data-val');
    var isCheck = el.getAttribute('data-ischeck') === 'true';
    toggleOpt(qid, val, isCheck);
}
function renderQuestionNav() {
    var g = document.getElementById('qnav-grid'), h = '';
    var types = [
        {key:'单选题', label:'单项选择题（20题·60分）'},
        {key:'多选题', label:'多项选择题（10题·30分）'},
        {key:'判断题', label:'判断题（10题·10分）'}
    ];
    for (var t=0; t<types.length; t++) {
        h += '<div class="qnav-section"><div class="qnav-label">'+types[t].label+'</div><div class="qnav-row">';
        for (var i=0; i<examQuestions.length; i++) {
            var q = examQuestions[i]; if (q.type !== types[t].key) continue;
            var v = userAnswers[q.qid], answered = false;
            if (typeof v === 'object') answered = v && Object.keys(v).length>0;
            else if (v) answered = true;
            h += '<div class="qnav-dot '+(answered?'answered':'unanswered')+'" data-qid="'+q.qid+'" onclick="scrollToQ(this)">'+(i+1)+'</div>';
        }
        h += '</div></div>';
    }
    g.innerHTML = h;
}

function submitExam() {
    var unanswered = examQuestions.filter(function(q) {
        var v = userAnswers[q.qid];
        return !v || (typeof v === 'object' && Object.keys(v).length === 0);
    });
    if (unanswered.length > 0 && !confirm('还有 '+unanswered.length+' 道题未作答，确定提交吗？')) return;

    clearInterval(timerInterval);
    document.removeEventListener('visibilitychange', window._cheatHandler);
    window._examActive = false;
    document.getElementById('btn-submit').disabled = true;

    var totalScore = 0, details = [];
    examQuestions.forEach(function(q) {
        var ua = userAnswers[q.qid], uas = '';
        if (typeof ua === 'object' && ua) uas = Object.keys(ua).sort().join('');
        else if (ua) uas = ua; else uas = '(未作答)';
        var ok = uas === q.correctAnswer;
        if (ok) totalScore += q.points;
        details.push({type:q.type,category:q.category,stem:q.stem,options:q.questionOptions,userAnswer:uas,correctAnswer:q.correctAnswer,isCorrect:ok,points:q.points,explanation:q.explanation});
    });

    var correctCount = details.filter(function(d){return d.isCorrect;}).length;
    var record = {
        name:window._user.name,company:window._user.company,project:window._user.project,position:window._user.position,
        score:totalScore,total:100,correctCount:correctCount,totalCount:examQuestions.length,mode:mode,
        time:new Date().toLocaleString(),timeSec:Math.floor((Date.now()-examStartTime)/1000)
    };

    rankings.push(record);
    rankings.sort(function(a,b){return b.score-a.score;});
    if (rankings.length>50) rankings = rankings.slice(0,50);
    localStorage.setItem('exam_rankings', JSON.stringify(rankings));

    showResults(totalScore, details, record);

    try {
        if (mode === 'exam') {
            sendToAPI(record, details);
            document.getElementById('wrong-review-card').classList.add('hidden');
            document.getElementById('ranking-card').classList.add('hidden');
        } else {
            document.getElementById('wrong-review-card').classList.remove('hidden');
            document.getElementById('ranking-card').classList.remove('hidden');
        }
    } catch(e) { console.error(e); }

    document.getElementById('page-exam').classList.add('hidden');
    document.getElementById('page-results').classList.remove('hidden');
    window.scrollTo(0,0);
}

function showResults(score, details, record) {
    var passed = score >= 60;
    var stars = score >= 90 ? '⭐⭐⭐⭐⭐' : score >= 75 ? '⭐⭐⭐⭐' : score >= 60 ? '⭐⭐⭐' : score >= 40 ? '⭐⭐' : '⭐';
    var fb = getFeedback(score, details);

    document.getElementById('result-summary').innerHTML =
        '<div class="score-ring '+(passed?'pass':'fail')+'"><div class="score-num">'+score+'</div><div class="score-total">/ 100 分</div></div>'+
        '<div class="score-grade">'+stars+' '+(passed?'合格':'未合格')+'</div>'+
        '<p style="font-size:13px;color:var(--text2);margin-top:4px;">答对 <b>'+record.correctCount+'</b>/'+record.totalCount+' 题 · 用时 '+Math.floor(record.timeSec/60)+'分'+(record.timeSec%60)+'秒</p>'+
        '<div class="feedback-bubble" style="margin-top:16px;">'+fb+'</div>';

    var wrong = details.filter(function(d){return !d.isCorrect;});
    var wh = '';
    if (wrong.length === 0) {
        wh = '<p style="text-align:center;color:var(--green);font-size:16px;padding:30px;">🎉 全部正确！太棒了！</p>';
    } else {
        wrong.forEach(function(d,i) {
            wh += '<div class="wrong-card"><div class="wc-stem"><b>'+(i+1)+'.</b> ['+d.type+'] '+d.stem+'</div>';
            wh += '<div>'+d.options.map(function(o){return '<div class="wc-opt">'+o+'</div>';}).join('')+'</div>';
            wh += '<div class="wc-row"><span class="wc-you">❌ 你的答案：'+d.userAnswer+'</span><span class="wc-correct">✅ 正确答案：'+d.correctAnswer+'</span></div>';
            if (d.explanation) wh += '<div class="wc-explain">💡 '+d.explanation+'</div>';
            wh += '</div>';
        });
    }
    document.getElementById('wrong-answers').innerHTML = wh;

    var rh = '';
    rankings.forEach(function(r,i) {
        var pos = i+1, pc = pos===1?'gold':pos===2?'silver':pos===3?'bronze':'';
        var sc = r.score>=60?'good':'ok';
        rh += '<div class="rank-row"><div class="rank-pos '+pc+'">'+(pos<=3?['🥇','🥈','🥉'][pos-1]:pos)+'</div><div class="rank-info"><div class="rank-name">'+r.name+'</div><div class="rank-meta">'+r.company+' · '+r.project+'</div></div><div class="rank-score '+sc+'">'+r.score+'分</div></div>';
    });
    document.getElementById('ranking-body').innerHTML = rh;
}

function getFeedback(score, details) {
    var wc = {};
    details.filter(function(d){return !d.isCorrect;}).forEach(function(d){wc[d.category]=(wc[d.category]||0)+1;});
    var we = Object.entries(wc).sort(function(a,b){return b[1]-a[1];});
    var wk = we.length>0 ? we[0][0] : null;
    if (score >= 95) return '非常出色！您对工程质量管控知识掌握得极为扎实，堪称标杆。';
    if (score >= 85) return '表现优秀！基本功扎实，继续保持。'+(wk?'可以重点关注「'+wk+'」相关知识点的巩固复习。':'');
    if (score >= 70) return '良好！已掌握大部分核心知识。'+(wk?'建议加强对「'+wk+'」的学习，补齐短板。':'')+'多做自测练习是提升的好方法。';
    if (score >= 60) return '合格！基础过关，但还有较大提升空间。'+(wk?'「'+wk+'」是您的薄弱环节，建议重点复习。':'')+'建议使用自测模式多加练习。';
    if (score >= 40) return '需要加强学习。建议从头系统复习规范手册，打好理论基础后再来挑战。每天进步一点点！';
    return '不要气馁！工程质量管控需要长期积累。失败是成功之母，每次考试都是成长的机会。加油！';
}

function goHome() {
    document.getElementById('page-results').classList.add('hidden');
    document.getElementById('page-exam').classList.add('hidden');
    document.getElementById('page-register').classList.remove('hidden');
    window.scrollTo(0, 0);
}

// ── Admin ────────────────────────────────────────────────────
function showAdminLogin() {
    document.getElementById('admin-login-modal').classList.remove('hidden');
    document.getElementById('admin-error').style.display = 'none';
    document.getElementById('admin-user').value = '';
    document.getElementById('admin-pass').value = '';
}
function hideAdminLogin() {
    document.getElementById('admin-login-modal').classList.add('hidden');
}
function adminLogin() {
    var u = document.getElementById('admin-user').value.trim();
    var p = document.getElementById('admin-pass').value.trim();
    if (u === 'cr7' && p === 'admin') {
        document.getElementById('admin-login-modal').classList.add('hidden');
        document.getElementById('page-register').classList.add('hidden');
        document.getElementById('page-admin').classList.remove('hidden');
        loadAdminData();
    } else {
        document.getElementById('admin-error').style.display = 'block';
    }
}
// ── QR Code ──────────────────────────────────────────────────
function toggleQR() {
    var el = document.getElementById('qr-section');
    el.classList.toggle('hidden');
    if (!el.classList.contains('hidden')) {
        var url = window.location.href;
        document.getElementById('qr-url-input').value = url;
        document.getElementById('qr-url-text').textContent = url;
        genQR();
    }
}
function genQR() {
    var url = document.getElementById('qr-url-input').value.trim() || window.location.href;
    document.getElementById('qr-url-text').textContent = url;
    var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url);
    document.getElementById('qr-container').innerHTML = '<img src="' + qrUrl + '" width="200" height="200" alt="QR Code" style="display:block;">';
}

function closeAdmin() {
    document.getElementById('page-admin').classList.add('hidden');
    document.getElementById('page-register').classList.remove('hidden');
}
function loadAdminData() {
    document.getElementById('admin-info').textContent = '正在从服务器加载数据...';
    fetch('https://quickform.cn/api/pupffnoouj/all')
        .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.json();
        })
        .then(function(data) {
            var list = Array.isArray(data) ? data : (data.submissions || data.data || data.records || data.list || []);
            if (list.length === 0) {
                document.getElementById('admin-info').textContent = '暂无考试数据';
            } else {
                renderAdminDashboard(list);
            }
        })
        .catch(function(e) {
            document.getElementById('admin-info').textContent = '⚠️ 加载失败: ' + e.message + ' | 请使用服务器方式打开（node start_server.js）';
        });
}

function renderAdminDashboard(records) {
    if (!records || !records.length) {
        document.getElementById('admin-info').textContent = '暂无考试数据';
        return;
    }
    var total = records.length;
    var sumScore = records.reduce(function(s,r){return s+(r.score||0);},0);
    var avgAll = Math.round(sumScore/total);
    var passCount = records.filter(function(r){return(r.score||0)>=60;}).length;
    var passRate = Math.round(passCount/total*100);
    var maxScore = Math.max.apply(null, records.map(function(r){return r.score||0;}));
    var minScore = Math.min.apply(null, records.map(function(r){return r.score||0;}));

    // Overview cards
    document.getElementById('admin-info').textContent = '共 ' + total + ' 条考试记录 | ' + new Date().toLocaleString();
    document.getElementById('admin-overview').innerHTML =
        '<div class="overview-card"><div class="ov-num" style="color:#007AFF;">'+total+'</div><div class="ov-label">考试总人次</div></div>' +
        '<div class="overview-card"><div class="ov-num" style="color:'+(avgAll>=70?'#34C759':avgAll>=60?'#FF9500':'#FF3B30')+';">'+avgAll+'</div><div class="ov-label">平均分数</div></div>' +
        '<div class="overview-card"><div class="ov-num" style="color:'+(passRate>=70?'#34C759':'#FF9500')+';">'+passRate+'%</div><div class="ov-label">整体合格率</div></div>' +
        '<div class="overview-card"><div class="ov-num" style="color:#007AFF;">'+maxScore+'</div><div class="ov-label">最高分</div></div>';

    // Company chart
    var coMap = {};
    records.forEach(function(r){var c=r.company||'未知';if(!coMap[c])coMap[c]={total:0,count:0,pass:0};coMap[c].total+=r.score||0;coMap[c].count++;if((r.score||0)>=60)coMap[c].pass++;});
    var coArr = Object.entries(coMap).sort(function(a,b){return(b[1].total/b[1].count)-(a[1].total/a[1].count);});
    var coHtml = '';
    coArr.forEach(function(e){
        var avg=Math.round(e[1].total/e[1].count), pr=Math.round(e[1].pass/e[1].count*100);
        var color=avg>=80?'#34C759':avg>=60?'#FF9500':'#FF3B30';
        coHtml+='<div class="bar-wrap"><div class="bar-label"><b>'+e[0]+'</b><span>'+e[1].count+'人 | 均分 '+avg+' | 合格率 '+pr+'%</span></div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(avg,15)+'%;background:'+color+';">'+avg+'分</div></div></div>';
    });
    document.getElementById('chart-company').innerHTML=coHtml||'<p style="color:var(--text2);text-align:center;padding:20px;">暂无数据</p>';

    // Project chart
    var prMap = {};
    records.forEach(function(r){var p=r.project||'未知';if(!prMap[p])prMap[p]={total:0,count:0,pass:0};prMap[p].total+=r.score||0;prMap[p].count++;if((r.score||0)>=60)prMap[p].pass++;});
    var prArr = Object.entries(prMap).sort(function(a,b){return b[1].count-a[1].count;});
    var prHtml = '';
    prArr.forEach(function(e){
        var avg=Math.round(e[1].total/e[1].count), pr=Math.round(e[1].pass/e[1].count*100);
        var color=avg>=80?'#34C759':avg>=60?'#FF9500':'#FF3B30';
        prHtml+='<div class="bar-wrap"><div class="bar-label"><b>'+e[0]+'</b><span>'+e[1].count+'人 | 均分 '+avg+' | 合格率 '+pr+'%</span></div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(avg,15)+'%;background:'+color+';">'+avg+'分</div></div></div>';
    });
    document.getElementById('chart-project').innerHTML=prHtml||'<p style="color:var(--text2);text-align:center;padding:20px;">暂无数据</p>';

    // Score distribution
    var buckets = {'90-100':0,'80-89':0,'70-79':0,'60-69':0,'40-59':0,'0-39':0};
    var colors = ['#34C759','#007AFF','#5AC8FA','#FF9500','#FF3B30','#C7C7CC'];
    records.forEach(function(r){var s=r.score||0;if(s>=90)buckets['90-100']++;else if(s>=80)buckets['80-89']++;else if(s>=70)buckets['70-79']++;else if(s>=60)buckets['60-69']++;else if(s>=40)buckets['40-59']++;else buckets['0-39']++;});
    var maxB = Math.max.apply(null,Object.values(buckets))||1;
    var distHtml = '';
    var keys = Object.keys(buckets);
    keys.forEach(function(k,i){
        var v=buckets[k],pct=Math.round(v/maxB*100);
        distHtml+='<div class="dist-bar"><div class="dist-label">'+k+'</div><div class="dist-track"><div class="dist-fill" style="width:'+Math.max(pct,8)+'%;background:'+colors[i]+';">'+(v>0?v+'人':'')+'</div></div><div class="dist-count">'+v+'人</div></div>';
    });
    document.getElementById('chart-distribution').innerHTML=distHtml;

    // Pass rate by company
    var passHtml = '';
    coArr.forEach(function(e){
        var pr=Math.round(e[1].pass/e[1].count*100);
        var bg=pr>=80?'#34C759':pr>=60?'#FF9500':'#FF3B30';
        passHtml+='<div class="pass-card"><div class="pass-ring" style="background:'+bg+';">'+pr+'%</div><div class="pass-info"><div class="pass-name">'+e[0]+'</div><div class="pass-meta">'+e[1].pass+'/'+e[1].count+' 人合格</div></div><div style="font-size:20px;">'+(pr>=80?'✅':pr>=60?'⚠️':'❌')+'</div></div>';
    });
    document.getElementById('chart-passrate').innerHTML=passHtml||'<p style="color:var(--text2);text-align:center;padding:20px;">暂无数据</p>';

    // Individual rankings
    var sorted = records.slice().sort(function(a,b){return(b.score||0)-(a.score||0);});
    var rankHtml = '';
    sorted.forEach(function(r,i){
        var s=r.score||0, sc=s>=60?'good':'ok';
        rankHtml+='<div class="rank-row"><div class="rank-pos '+(i===0?'gold':i===1?'silver':i===2?'bronze':'')+'">'+(i<=2?['🥇','🥈','🥉'][i]:i+1)+'</div><div class="rank-info"><div class="rank-name">'+(r.name||'?')+'</div><div class="rank-meta">'+(r.company||'')+' · '+(r.project||'')+' | '+(r.time||'')+'</div></div><div class="rank-score '+sc+'">'+s+'分</div></div>';
    });
    document.getElementById('admin-ranking').innerHTML=rankHtml||'<p style="color:var(--text2);text-align:center;padding:20px;">暂无数据</p>';
}

function sendToAPI(record, details) {
    try {
        var payload = JSON.stringify({
            name:record.name,company:record.company,project:record.project,position:record.position,
            score:record.score,total:record.total,correctCount:record.correctCount,totalCount:record.totalCount,
            mode:record.mode,time:record.time,timeSec:record.timeSec,
            details:details.map(function(d){return{type:d.type,category:d.category,stem:d.stem,userAnswer:d.userAnswer,correctAnswer:d.correctAnswer,isCorrect:d.isCorrect,points:d.points};})
        });
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://quickform.cn/api/pupffnoouj', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.timeout = 5000;
        xhr.send(payload);
    } catch(e) {}
}
